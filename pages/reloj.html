<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>E.T.I. Leonardo Infante - Control de Asistencia</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#dce2f7",
                    "error": "#ba1a1a",
                    "outline-variant": "#bccbb9",
                    "on-primary": "#ffffff",
                    "on-surface": "#141b2b",
                    "surface-container-low": "#f1f3ff",
                    "primary-container": "#22c55e",
                    "surface-container-highest": "#dce2f7",
                    "background": "#f9f9ff",
                    "secondary-container": "#2170e4",
                    "primary": "#006e2f",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#e1e8fd",
                    "inverse-surface": "#293040",
                    "surface-bright": "#f9f9ff",
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Atkinson Hyperlegible Next', sans-serif; background-color: #f9f9ff; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .digital-clock { font-variant-numeric: tabular-nums; letter-spacing: -0.05em; }
        /* Estilos para el teclado numérico */
        .numpad-btn { transition: all 0.1s; }
        .numpad-btn:active { transform: scale(0.95); background-color: #dce2f7; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<header class="w-full h-[72px] bg-surface border-b-2 border-outline-variant sticky top-0 z-50">
    <div class="flex justify-between items-center px-6 max-w-[1200px] mx-auto w-full h-full">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary text-3xl">fingerprint</span>
            <h1 class="text-2xl font-bold text-on-surface">Terminal Biométrico</h1>
        </div>
        <nav class="hidden md:flex gap-8 items-center h-full">
            <a href="index.html" class="font-bold text-on-surface hover:bg-surface-container-low transition-colors px-4 py-2 rounded-lg border border-outline-variant active:scale-95 duration-150 inline-block shadow-sm">
                Administración Escolar
            </a>
        </nav>
    </div>
</header>

<main class="flex-grow flex flex-col items-center justify-center px-4 py-8">
    <div class="w-full max-w-[1000px] flex flex-col lg:flex-row items-center gap-12">
        
        <!-- SECCIÓN IZQUIERDA: Reloj y estatus -->
        <div class="w-full lg:w-1/2 flex flex-col items-center gap-6">
            <div class="text-center space-y-2">
                <p class="font-bold text-lg text-primary uppercase tracking-widest">E.T.I. Leonardo Infante</p>
                <h2 class="font-bold text-4xl text-on-surface leading-tight">Control de Asistencia</h2>
            </div>

            <div class="w-full bg-white border-2 border-outline-variant rounded-[32px] p-8 text-center shadow-sm">
                <div class="digital-clock font-bold text-on-surface text-[64px] md:text-[80px] leading-none tracking-tighter" id="clock">
                    00:00:00
                </div>
                <div class="text-xl text-on-surface mt-3 opacity-80 font-semibold" id="date-display">
                    Cargando fecha...
                </div>
            </div>
            
            <div id="mensaje-feedback" class="w-full text-center py-4 px-6 rounded-2xl font-bold text-lg hidden transition-all duration-300">
                <!-- Aquí aparecerá el feedback visual dinámico -->
            </div>
        </div>

        <!-- SECCIÓN DERECHA: Teclado interactivo y campo de cédula -->
        <div class="w-full lg:w-1/2 max-w-[450px] bg-white border-2 border-outline-variant rounded-[32px] p-8 shadow-sm">
            <div class="flex flex-col gap-2 mb-6">
                <label class="font-bold text-sm text-on-surface px-2 text-center" for="cedula">INGRESE SU CÉDULA DE IDENTIDAD</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-6 top-1/2 -translate-y-1/2 text-on-surface text-3xl transition-colors">badge</span>
                    <input class="w-full h-[80px] pl-16 pr-6 bg-surface-container-low border-2 border-outline-variant rounded-2xl text-4xl font-bold text-center tracking-widest focus:ring-4 focus:ring-primary/20 focus:border-primary transition-all outline-none text-on-surface" id="cedula" name="cedula" type="text" readonly placeholder="---"/>
                </div>
            </div>

            <!-- Teclado Numérico en Pantalla -->
            <div class="grid grid-cols-3 gap-3 mb-6">
                <button class="numpad-btn h-16 bg-surface-container-low border-2 border-outline-variant rounded-xl text-2xl font-bold text-on-surface" onclick="agregarNumero('1')">1</button>
                <button class="numpad-btn h-16 bg-surface-container-low border-2 border-outline-variant rounded-xl text-2xl font-bold text-on-surface" onclick="agregarNumero('2')">2</button>
                <button class="numpad-btn h-16 bg-surface-container-low border-2 border-outline-variant rounded-xl text-2xl font-bold text-on-surface" onclick="agregarNumero('3')">3</button>
                <button class="numpad-btn h-16 bg-surface-container-low border-2 border-outline-variant rounded-xl text-2xl font-bold text-on-surface" onclick="agregarNumero('4')">4</button>
                <button class="numpad-btn h-16 bg-surface-container-low border-2 border-outline-variant rounded-xl text-2xl font-bold text-on-surface" onclick="agregarNumero('5')">5</button>
                <button class="numpad-btn h-16 bg-surface-container-low border-2 border-outline-variant rounded-xl text-2xl font-bold text-on-surface" onclick="agregarNumero('6')">6</button>
                <button class="numpad-btn h-16 bg-surface-container-low border-2 border-outline-variant rounded-xl text-2xl font-bold text-on-surface" onclick="agregarNumero('7')">7</button>
                <button class="numpad-btn h-16 bg-surface-container-low border-2 border-outline-variant rounded-xl text-2xl font-bold text-on-surface" onclick="agregarNumero('8')">8</button>
                <button class="numpad-btn h-16 bg-surface-container-low border-2 border-outline-variant rounded-xl text-2xl font-bold text-on-surface" onclick="agregarNumero('9')">9</button>
                <button class="numpad-btn h-16 bg-error/10 border-2 border-error/20 rounded-xl text-error font-bold" onclick="limpiarCedula()">C</button>
                <button class="numpad-btn h-16 bg-surface-container-low border-2 border-outline-variant rounded-xl text-2xl font-bold text-on-surface" onclick="agregarNumero('0')">0</button>
                <button class="numpad-btn h-16 bg-surface-variant border-2 border-outline-variant rounded-xl text-on-surface flex items-center justify-center" onclick="borrarNumero()">
                    <span class="material-symbols-outlined text-3xl">backspace</span>
                </button>
            </div>

            <button id="btn-marcar" class="w-full h-[80px] bg-primary text-white font-bold text-2xl rounded-2xl flex items-center justify-center gap-3 hover:brightness-110 active:scale-[0.98] transition-all shadow-md">
                <span class="material-symbols-outlined text-4xl">touch_app</span> MARCAR ASISTENCIA
            </button>
        </div>
    </div>
</main>

<!-- Scripts unificados al final del archivo reloj.html -->
<script src="../js/seguridad.js"></script>
<script src="../js/reloj.js"></script>
</body></html>
